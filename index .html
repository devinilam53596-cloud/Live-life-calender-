<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year Progress Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --past: #111111;   /* Black (Lived/Fast) */
            --today: #00ffff;  /* Cyan (Current Day) */
            --future: #ffffff; /* White (Upcoming Days) */
            --accent: #00ffff;
        }
        body, html { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* Logo & Header */
        .logo-container { padding: 20px; text-align: center; }
        .logo { width: 50px; height: 50px; border: 2px solid var(--accent); border-radius: 10px; display: inline-block; line-height: 50px; font-weight: bold; color: var(--accent); }

        .menu-btn { position: fixed; top: 15px; left: 15px; cursor: pointer; z-index: 1001; background: #222; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); color: var(--accent); font-size: 20px; }
        
        .sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: #0a0a0a; transition: 0.3s; z-index: 1000; padding-top: 60px; border-right: 1px solid #333; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 15px; font-size: 12px; color: #666; text-transform: uppercase; }
        .sidebar-item { padding: 12px 25px; cursor: pointer; border-bottom: 1px solid #1a1a1a; font-size: 15px; }
        .sidebar-item:hover { background: var(--accent); color: #000; }

        .app-container { width: 92%; max-width: 500px; margin: 10px auto; padding: 15px; text-align: center; border-radius: 20px; }
        
        .year-display { font-size: 2.5rem; font-weight: 900; color: var(--accent); margin-bottom: 5px; letter-spacing: 2px; }
        .stats-text { font-size: 0.8rem; color: #888; margin-bottom: 20px; text-transform: uppercase; }

        /* 365 Grid Layout */
        .grid-365 { 
            display: grid; 
            grid-template-columns: repeat(15, 1fr); 
            gap: 4px; 
            margin: 20px auto;
            justify-content: center;
        }
        
        .day-box { aspect-ratio: 1/1; border-radius: 2px; transition: 0.2s; border: 1px solid #222; }
        
        /* Box Colors */
        .past { background: var(--past); border: 1px solid #333; }
        .present { background: var(--accent); box-shadow: 0 0 12px var(--accent); border: none; }
        .future { background: var(--future); border: 1px solid #ccc; }

        .btn-save { width: 100%; background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 50px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 30px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleSidebar()">☰</div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Select Year</div>
        <div id="year-list"></div>
        <div style="margin-top: 20px;" class="sidebar-header">Settings</div>
        <div class="sidebar-item" onclick="downloadWallpaper()">🖼️ Save as Wallpaper</div>
        <div class="sidebar-item" onclick="location.reload()">🔄 Refresh Live</div>
    </div>

    <div class="app-container" id="capture-area">
        <div class="logo-container">
            <div class="logo">2026</div>
        </div>
        
        <div class="year-display" id="currentYearTitle">2026</div>
        <div class="stats-text" id="statsDisplay">Loading...</div>

        <div class="grid-365" id="grid365"></div>
        
        <button class="btn-save" onclick="downloadWallpaper()">Save as Wallpaper</button>
    </div>

    <script>
        let selectedYear = new Date().getFullYear();
        if (selectedYear < 2026) selectedYear = 2026;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        // Sidebar Year Generation (2026 to 2039)
        const yearList = document.getElementById('year-list');
        for (let y = 2026; y <= 2039; y++) {
            let div = document.createElement('div');
            div.className = 'sidebar-item';
            div.innerText = `Year ${y}`;
            div.onclick = () => { selectedYear = y; toggleSidebar(); renderCalendar(); };
            yearList.appendChild(div);
        }

        function renderCalendar() {
            const grid = document.getElementById('grid365');
            const stats = document.getElementById('statsDisplay');
            const title = document.getElementById('currentYearTitle');
            grid.innerHTML = '';
            title.innerText = selectedYear;

            const now = new Date();
            const isLeap = (selectedYear % 4 === 0 && selectedYear % 100 !== 0) || (selectedYear % 400 === 0);
            const totalDays = isLeap ? 366 : 365;

            // Calculate current day of the year
            let dayOfYear = 0;
            if (now.getFullYear() === selectedYear) {
                const start = new Date(now.getFullYear(), 0, 0);
                const diff = now - start;
                const oneDay = 1000 * 60 * 60 * 24;
                dayOfYear = Math.floor(diff / oneDay);
            } else if (now.getFullYear() > selectedYear) {
                dayOfYear = totalDays + 1; // All past
            }

            const percent = ((dayOfYear / totalDays) * 100).toFixed(1);
            stats.innerText = `${dayOfYear} Days Fast | ${totalDays - dayOfYear} Days Remain | ${percent}% Done`;

            for (let i = 1; i <= totalDays; i++) {
                const box = document.createElement('div');
                box.className = 'day-box';
                
                if (i < dayOfYear) box.classList.add('past');      // Black
                else if (i === dayOfYear) box.classList.add('present'); // Blue/Cyan
                else box.classList.add('future');                 // White

                grid.appendChild(box);
            }
        }

        async function downloadWallpaper() {
            const element = document.getElementById('capture-area');
            const canvas = await html2canvas(element, { backgroundColor: '#000', scale: 2 });
            const link = document.createElement('a');
            link.download = `Progress_${selectedYear}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        renderCalendar();
    </script>
</body>
</html>
